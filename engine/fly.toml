# FORJD engine (Rust HTTP) on Fly.io
#
# Deploy (from this directory):
#   fly apps create forjd-engine
#   fly deploy
#
# Health: https://forjd-engine.fly.dev/health
# Private: http://forjd-engine.internal:8080
#
# From other Fly apps:
#   ENGINE_URL=http://forjd-engine.internal:8080

app = 'forjd-engine'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  RUST_LOG = 'info'
  PORT = '8080'
  # Set via `fly secrets set ENGINE_API_TOKEN=…` so mutate routes are protected.
  # RUST_BACKTRACE = '1'  # only while debugging

[http_service]
  internal_port = 8080
  force_https = true
  # Keep one machine up — backend reaches us over 6PN (.internal), which does not
  # wake stopped Machines the way the public proxy does.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 50

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
