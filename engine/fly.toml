# FORJD engine (process + data plane) on Fly.io
#
# Deploy (from this directory):
#   fly apps create forjd-engine
#   fly secrets set ENGINE_API_TOKEN=… DATABASE_URL=… REDIS_URL=…
#   fly deploy
#
# Health: https://forjd-engine.fly.dev/health
# Private: http://forjd-engine.internal:8080
#
# From other Fly apps:
#   ENGINE_URL=http://forjd-engine.internal:8080

app = 'forjd-engine'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  RUST_LOG = 'info'
  PORT = '8080'
  # Full data plane in one process (relay/scheduler/probe/normalizer/ingest).
  # Override with FORJD_ROLE=engine for process/summarize only.
  FORJD_ROLE = 'all'
  FORJD_TRANSPORT_SECURITY = 'required'
  # Secrets: ENGINE_API_TOKEN, DATABASE_URL (or POSTGRES_DSN), REDIS_URL
  # Optional: CPE_REDIS_URL, FORJD_INTERNODE_*, OTEL_*

[http_service]
  internal_port = 8080
  force_https = true
  # Keep machines up — backend reaches us over 6PN (.internal).
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 200
    soft_limit = 100

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-2x'
  memory = '2048mb'
