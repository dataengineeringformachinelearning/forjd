[package]
name = "engine"
version = "0.1.0"
edition = "2021"
description = "FJORD High-Performance Engine (Rust core)"

[lib]
crate-type = ["cdylib", "rlib"]   # for Python interop + native use

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
arrow = "52"
parquet = "52"