# FORJD backend (FastAPI) on Fly.io
#
# Build context is the **repo root** (Dockerfile copies engine/ for the PyO3 wheel):
#   fly apps create forjd-backend
#   fly volumes create ml_models --size 1 --region iad -a forjd-backend
#   fly secrets set POSTGRES_DSN=… REDIS_URL=… ENGINE_API_TOKEN=… -a forjd-backend
#   fly deploy --config fly.api.toml
#
# Health: https://forjd-backend.fly.dev/health (custom: https://backend.forjd.co/health)
# Private: http://forjd-backend.internal:8000

app = 'forjd-backend'
primary_region = 'iad'

[build]
  dockerfile = 'backend/Dockerfile'
  ignorefile = '.dockerignore'

[env]
  ENVIRONMENT = 'production'
  DEBUG = 'false'
  HOST = '0.0.0.0'
  PORT = '8000'
  # Engine over Fly 6PN (token via secrets)
  ENGINE_URL = 'http://forjd-engine.internal:8080'
  ENGINE_TIMEOUT_SECONDS = '10'
  # Prefect optional — soft-fail when unreachable
  PREFECT_API_URL = ''
  # Durable projection catch-up. DB leases make concurrent API machines safe.
  PROJECTION_TICK_SECONDS = '5'
  PREFECT_HOME = '/home/forjd/.prefect'
  HOME = '/home/forjd'
  # LSTM-AE checkpoints (Fly volume mount)
  ML_MODEL_DIR = '/data/models'
  ML_MODEL_VERSION = 'lstm-ae-v1'
  ML_SEQ_LEN = '16'
  ML_LATENT_DIM = '16'
  ML_HIDDEN_DIM = '32'
  ML_EPOCHS = '20'
  ML_ANOMALY_THRESHOLD = '0.15'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 50

  [[http_service.checks]]
    interval = '15s'
    timeout = '10s'
    grace_period = '90s'
    method = 'GET'
    path = '/ready'

[mounts]
  source = 'ml_models'
  destination = '/data/models'

[[vm]]
  size = 'shared-cpu-2x'
  memory = '2048mb'
