# Dragonfly for FORJD — Redis-compatible cache on Fly.io
#
# Deploy (from this directory):
#   fly apps create forjd-dragonfly
#   fly volumes create dragonfly_data --size 1 --region iad
#   fly secrets set DFLY_requirepass='…strong-password…'
#   fly deploy
#
# Connect from other Fly apps (private 6PN only — no public TCP):
#   REDIS_URL=redis://:PASSWORD@forjd-dragonfly.internal:6379/0
#
# Debug public access (avoid in production):
#   Add [[services.ports]] port = 6379, then `fly ips allocate-v4`

app = 'forjd-dragonfly'
primary_region = 'iad'

[build]
  image = 'docker.dragonflydb.io/dragonflydb/dragonfly:v1.39.0'

[env]
  # Persist snapshots under the mounted volume.
  DFLY_dir = '/data'
  DFLY_dbfilename = 'dragonfly'

[mounts]
  source = 'dragonfly_data'
  destination = '/data'

# Internal TCP only — reachable via *.internal / Flycast, not the public internet.
[[services]]
  protocol = 'tcp'
  internal_port = 6379
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[services.tcp_checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
