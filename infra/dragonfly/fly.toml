# Dragonfly for FORJD — Redis-compatible cache on Fly.io
#
# First-time setup (CLI):
#   fly apps create forjd-dragonfly
#   fly volumes create dragonfly_data --size 1 --region iad -a forjd-dragonfly
#   fly secrets set DFLY_requirepass='…strong-password…' -a forjd-dragonfly
#   cd infra/dragonfly && fly deploy
#
# Connect from other Fly apps (private network):
#   REDIS_URL=redis://:PASSWORD@forjd-dragonfly.internal:6379/0

app = 'forjd-dragonfly'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  DFLY_dir = '/data'
  DFLY_dbfilename = 'dragonfly'

# Required before first successful deploy:
#   fly volumes create dragonfly_data --size 1 --region iad -a forjd-dragonfly
[mounts]
  source = 'dragonfly_data'
  destination = '/data'

[[services]]
  protocol = 'tcp'
  internal_port = 6379
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 6379

  [[services.tcp_checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
