# Dragonfly for FORJD — Redis-compatible cache on Fly.io
#
# Deploy (from this directory):
#   fly apps create dragonfly
#   fly volumes create dragonfly_data --size 1 --region iad
#   fly secrets set DFLY_requirepass='…strong-password…'
#   fly deploy
#
# Connect from other Fly apps (private network):
#   REDIS_URL=redis://:PASSWORD@dragonfly.internal:6379/0
#
# Optional public TCP (debug only — prefer private .internal):
#   fly ips allocate-v4  # then clients use dragonfly.fly.dev:6379

app = 'dragonfly'
primary_region = 'iad'

[build]
  image = 'docker.dragonflydb.io/dragonflydb/dragonfly:v1.39.0'

[env]
  # Persist snapshots under the mounted volume.
  DFLY_dir = '/data'
  DFLY_dbfilename = 'dragonfly'

[mounts]
  source = 'dragonfly_data'
  destination = '/data'

[[services]]
  protocol = 'tcp'
  internal_port = 6379
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 6379

  [[services.tcp_checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
