# DEML subprocessor telemetry — matches DEML sealed ingest contract.
# Partner calls with tenant fjsvc_ token; workflow_id=deml_telemetry.
id: deml_telemetry
name: DEML sealed telemetry
description: >
  Sealed metric/alert telemetry from the DEML learning control plane.
  Same blind sealed_metadata processor as other subprocessors — FORJD never
  opens ciphertext. Metadata is routing tags only.
version: 1
enabled: true
default: false

event_types:
  - name: deml.metric
    content_type: application/forjd-telemetry+v1
    description: Numeric / counter telemetry from DEML
  - name: deml.alert
    content_type: application/forjd-telemetry+v1
    description: Alert / finding envelope from DEML

match:
  content_types:
    - application/forjd-telemetry+v1
  event_types:
    - deml.metric
    - deml.alert

encryption:
  modes: [e2ee]
  algos: [aes-256-gcm]

pipeline:
  # Rust forjd-engine preferred via sealed_metadata; Pathway/Python fallback.
  processor: sealed_metadata
  projection:
    name: deml.sealed_rollup
    version: 1
    description: Sealed rollup + anomaly scores for DEML telemetry
  steps:
    - rollup
    - size_anomaly
    - rate_anomaly
  size_anomaly:
    zscore: 2.0
    max_cipher_len: 131072
  rate_anomaly:
    max_events: 200
    window_sec: 60

outputs:
  table: stream_results
  tags:
    use_case: deml_telemetry
    vertical: learning
    subprocessor: deml
