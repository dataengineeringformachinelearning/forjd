# Example: real-time analytics / product events (copy + customize for new SaaS).
id: analytics_events
name: Analytics events
description: >
  Product analytics and real-time counters. Rollup only by default —
  enable size_anomaly when envelope sizes are a useful signal.
version: 1
enabled: true
default: false

event_types:
  - name: page.view
    content_type: application/forjd-analytics+v1
  - name: feature.used
    content_type: application/forjd-analytics+v1

match:
  content_types:
    - application/forjd-analytics+v1
  event_types: []

encryption:
  modes: [e2ee]
  algos: [aes-256-gcm]

pipeline:
  processor: sealed_metadata
  projection:
    name: analytics.rollup
    version: 1
    description: Product analytics sealed rollup
  steps:
    - rollup
  size_anomaly:
    zscore: 3.0
    max_cipher_len: 524288

outputs:
  table: stream_results
  tags:
    use_case: analytics
