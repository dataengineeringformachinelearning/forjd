# Example only — not loaded by the registry (lives under examples/).
# Copy these aliases into a partner-local workflow YAML or merge into an
# enabled workflow under backend/workflows/ when a subprocessor sends
# product-local wire ids. FORJD core never hardcodes partner product names.
#
# Target family: threat_telemetry (id / event types below must match that file).

id: threat_telemetry
name: Threat telemetry (partner alias overlay example)
enabled: false
version: 1

aliases:
  workflow_ids:
    - partner_telemetry
  event_types:
    threat.metric:
      - partner.metric
    threat.alert:
      - partner.alert
  # Optional alternate MIME values (resolved before match.content_types).
  content_types:
    - application/vnd.partner.telemetry+v1

match:
  content_types:
    - application/forjd-telemetry+v1
