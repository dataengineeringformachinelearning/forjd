# Universal default — any sealed SaaS event type without a more specific match.
id: default_sealed
name: Default sealed stream
description: >
  Blind sealed-metadata rollup + size anomaly (Rust forjd-engine preferred,
  Pathway/Python fallback). Server never opens ciphertext.
version: 1
enabled: true
default: true

match:
  content_types:
    - application/forjd-event+v1
  event_types: []

encryption:
  modes: [e2ee]
  algos: [aes-256-gcm]

pipeline:
  # sealed_metadata prefers Rust; use rust_sealed_metadata for an explicit alias.
  processor: sealed_metadata
  projection:
    name: sealed.default
    version: 1
    description: Universal sealed-stream rollup
  steps:
    - rollup
    - size_anomaly
  size_anomaly:
    zscore: 2.5
    max_cipher_len: 262144

outputs:
  table: stream_results
  tags:
    use_case: generic
