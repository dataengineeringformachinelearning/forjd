# Example vertical (threat / telemetry SaaS) — not platform core.
# Any subprocessor points at this via content_type / workflow_id.
# Same blind processor as default; tighter thresholds + tagged outputs.
id: threat_telemetry
name: Threat telemetry (example)
description: >
  Sealed telemetry for a detection/response product. Demonstrates how a
  specialized SaaS vertical is just YAML — same E2EE ingest and projections.
  Any partner calls FORJD as a subprocessor with a tenant service
  token; it does not get a forked ingest path.
version: 1
enabled: true
default: false

event_types:
  - name: threat.metric
    content_type: application/forjd-telemetry+v1
    description: Numeric / counter telemetry
  - name: threat.alert
    content_type: application/forjd-telemetry+v1
    description: Alert / finding envelope

# Partner / legacy wire aliases are config-only. Do not put product-specific
# names in this first-party example — see workflows/examples/ for overlays.
# Example (partner-local YAML or examples/partner_legacy_aliases.example.yaml):
#   aliases:
#     workflow_ids: [partner_legacy_telemetry]
#     event_types:
#       threat.metric: [partner.metric]
#       threat.alert: [partner.alert]

match:
  content_types:
    - application/forjd-telemetry+v1
  event_types: []

encryption:
  modes: [e2ee]
  algos: [aes-256-gcm]

pipeline:
  # Rust forjd-engine preferred via sealed_metadata; Pathway/Python fallback.
  processor: sealed_metadata
  projection:
    name: threat.sealed_rollup
    version: 1
    description: Sealed rollup + anomaly scores for threat telemetry
  steps:
    - rollup
    - size_anomaly
    - rate_anomaly
  size_anomaly:
    zscore: 2.0
    max_cipher_len: 131072
  rate_anomaly:
    max_events: 200
    window_sec: 60

outputs:
  table: stream_results
  tags:
    use_case: threat_telemetry
    vertical: detection
