services:
  forjd-api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Prefer Supabase DSN from .env; Compose overrides Redis/Prefect/engine hosts.
      REDIS_URL: redis://:${DFLY_PASSWORD:-forjd-dev-local}@dragonfly:6379/0
      PREFECT_API_URL: http://prefect-server:4200/api
      # Out-of-process Rust engine (falls back to PyO3 wheel if unset / unreachable).
      ENGINE_URL: http://forjd-engine:8080
      ENGINE_API_TOKEN: ${ENGINE_API_TOKEN:-}
    depends_on:
      dragonfly:
        condition: service_healthy
      forjd-engine:
        condition: service_healthy
      prefect-server:
        condition: service_started
    volumes:
      - .:/app
      - /app/.venv
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - .venv/
        - action: rebuild
          path: ./pyproject.toml
        - action: rebuild
          path: ./uv.lock
        - action: rebuild
          path: ../engine

  forjd-engine:
    build:
      context: ../engine
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      RUST_LOG: info
      # Optional shared secret; set ENGINE_API_TOKEN in .env for both API + engine.
      ENGINE_API_TOKEN: ${ENGINE_API_TOKEN:-}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080'",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.39.0
    command:
      [
        "dragonfly",
        "--requirepass",
        "${DFLY_PASSWORD:-forjd-dev-local}",
        "--dir",
        "/data",
      ]
    ports:
      - "6379:6379"
    volumes:
      - dragonfly_data:/data
    ulimits:
      memlock: -1
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${DFLY_PASSWORD:-forjd-dev-local}",
          "ping",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  # Optional local Postgres when not using Supabase:
  #   docker compose --profile local-db up
  postgres:
    profiles: ["local-db"]
    image: postgres:18.4-trixie
    environment:
      POSTGRES_DB: forjd
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d forjd"]
      interval: 5s
      timeout: 5s
      retries: 10

  prefect-server:
    image: prefecthq/prefect:3.7.8-python3.12
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      PREFECT_UI_ENABLED: "true"
      PREFECT_SERVER_API_HOST: 0.0.0.0
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4200/api/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  dragonfly_data:
  postgres_data:
